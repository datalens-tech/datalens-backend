name: "🏷️ Validate PR Name"

on:
  pull_request:
    types: [opened, reopened, edited, synchronize]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  commitlint-pr-title:
    name: Ensure proper PR title
    runs-on: [ self-hosted, linux, k8s-runner-no-compose ]

    steps:
      - name: Commitlint PR title
        uses: datalens-tech/commitlint-action@7034d46de9ef5f5115b0a5d79a5bc9076515f853

  add_labels:
    runs-on: [ self-hosted, linux, k8s-runner-no-compose ]
    needs: commitlint-pr-title
    permissions:
      pull-requests: write

    steps:
      - name: Add labels to PR
        uses: datalens-tech/add-labels-action@4aad9f32de129ffde2d8a14e53b1acfb6d8a3b39
