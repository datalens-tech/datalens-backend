name: "🐊 Terrarium Check"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  workflow_dispatch:


jobs:
  pytest:
    runs-on: [ self-hosted, linux, k8s-runner-no-compose ]
    container:
      image: "ghcr.io/${{ github.repository_owner }}/docker-mirror/python:3.11.0"

    strategy:
      fail-fast: false
      matrix:
        value:
          - bi_ci
          # - dl_cli_tools
          - dl_gitmanager
          - dl_repmanager
    name: "🐊[pytest] ${{ matrix.value }}"
    steps:
      - uses: datalens-tech/cleanup-folder-action@2320ecc9839e80e006f214a31eeba3bca55aed0c
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup common tools
        run: pip install --no-input poetry
      - name: Install dependencies
        run: |
          cd "terrarium/${{ matrix.value }}"
          poetry -v install --with tests --without mypy
      - name: Pytest
        run: |
          cd "terrarium/${{ matrix.value }}"
          poetry run pytest .

  mypy:
    runs-on: [ self-hosted, linux, k8s-runner-no-compose ]
    container:
      image: "ghcr.io/${{ github.repository_owner }}/docker-mirror/python:3.11.0"

    strategy:
      fail-fast: false
      matrix:
        value:
          - bi_ci
          - dl_cli_tools
          - dl_gitmanager
          - dl_repmanager
    name: "🐊[mypy] ${{ matrix.value }}"
    steps:
      - uses: datalens-tech/cleanup-folder-action@2320ecc9839e80e006f214a31eeba3bca55aed0c
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup common tools
        run: pip install --no-input poetry
      - name: Install dependencies
        run: |
          cd "terrarium/${{ matrix.value }}"
          poetry -v install --with mypy --without tests
      - name: Mypy
        run: |
          cd "terrarium/${{ matrix.value }}"
          poetry run mypy .
