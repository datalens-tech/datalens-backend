[tool.poetry]
authors = ["DataLens Team <datalens-opensource@yandex-team.ru>"]
description = "Aux pyproject.toml for the common project properties"
license = "Apache 2.0"
name = "datalens_backend_root_package"
readme = "README.md"
version = "0.1.0"

[tool.poetry.dependencies]
python = ">=3.12, <3.13"

[tool.black]
force-exclude = '''
/(
  # The following are specific to Black, you probably don't want those.
  lib/redis-cache-lock/
  | lib/clickhouse-sqlalchemy/
  | lib/dl_formula/dl_formula/parser/antlr/gen/
  | lib/dl_task_processor/dl_task_processor/upstream_worker.py
)
'''
line-length = 120
target-version = ['py312']

[tool.isort]
force_grid_wrap = 2
force_sort_within_sections = true
include_trailing_comma = true
known_connectors = [
  "bi_connector_*",
  "dl_connector_*",
]
known_first_party = [
  "bi_*",
  "dl_*",
]
line_length = 120
multi_line_output = 3
profile = "black"
sections = [
  "FUTURE",
  "STDLIB",
  "THIRDPARTY",
  "FIRSTPARTY",
  "CONNECTORS",
  "LOCALFOLDER",
]
skip_glob = [
  "lib/clickhouse-sqlalchemy/*",
  "lib/dl_formula/dl_formula/parser/antlr/gen/*",
  "lib/dl_task_processor/dl_task_processor/upstream_worker.py",
  "lib/redis-cache-lock/*",
]

[tool.ruff]
exclude = [
  ".bzr",
  ".direnv",
  ".eggs",
  ".git",
  ".git-rewrite",
  ".hg",
  ".mypy_cache",
  ".nox",
  ".pants.d",
  ".pytype",
  ".ruff_cache",
  ".svn",
  ".tox",
  ".venv",
  "__pypackages__",
  "_build",
  "buck-out",
  "build",
  "dist",
  "lib/clickhouse-sqlalchemy/**",
  "lib/dl_formula/dl_formula/parser/antlr/gen/**",
  "lib/redis-cache-lock/**",
  "node_modules",
  "tools_venv",
  "venv",
]
force-exclude = true
line-length = 120
target-version = "py312"

[tool.ruff.lint]
ignore = [
  "B024", # is an abstract base class, but it has no abstract methods
  "B904", # force `raise ... from err` or `raise ... from None`
  "B905", # `zip()` without an explicit `strict=` parameter
  "E501", # line length, should be checked and fixed by black
  "RET503", # implicit return — usually a raise/abort path; adding explicit `return None` masks the actual control flow
  "RET504", # unnecessary assign before return — review needed per site; intermediate names often aid debugging
  "RUF001", # ambiguous-unicode-character-string — Cyrillic look-alikes are intentional in our user-facing strings
  "RUF002", # ambiguous-unicode-character-docstring — same intentional Cyrillic
  "RUF003", # ambiguous-unicode-character-comment — same intentional Cyrillic
  "RUF005", # collection-literal-concatenation — manual; iterable-unpacking rewrites need per-site review
  "RUF006", # asyncio-dangling-task — needs holding a reference to the created task; per-site review
  "RUF008", # mutable-dataclass-default — manual; needs field(default_factory=...)
  "RUF009", # function-call-in-dataclass-default-argument — attrs/dataclass factory pattern, per-site review
  "RUF012", # mutable-class-default — 1k+ sites; needs ClassVar annotations, separate task
  "RUF013", # implicit-optional — PEP 484 implicit Optional; per-site annotation review
  "RUF015", # unnecessary-iterable-allocation-for-first-element — manual next(iter(...)) rewrites
  "RUF017", # quadratic-list-summation — manual perf rewrite
  "RUF018", # assignment-in-assert — assert side-effects; per-site review
  "RUF022", # unsorted-dunder-all — already enforced by the standalone sort-all linter; avoid autofix conflict
  "RUF043", # pytest-raises-ambiguous-pattern — manual; needs anchored regex
  "RUF046", # unnecessary-cast-to-int — per-site review
  "RUF059", # unused-unpacked-variable — manual; rename to _ per site
  "RUF061", # legacy-form-pytest-raises — manual pytest.raises rewrite
  "RUF100", # unused-noqa — would strip noqa codes for rules not yet enabled by this migration; revisit (BI-7437)
  "UP031", # Use format specifiers instead of percent format
  "UP042", # Class inherits from both `str` and `enum.Enum`
  "UP046", # Non-PEP 695 generic class — needs manual conversion for attrs+cross-module TypeVar bounds
]
select = [
  # Bugbear
  "B",
  # Pyflakes
  "F",
  # flake8-return
  "RET",
  # Ruff-specific
  "RUF",
  # pyupgrade
  "UP",
]

[tool.tomlsort]
all = true
ignore_case = true
in_place = true
sort_first = [
  "tool.poetry",
  "tool.poetry.dependencies",
  "tool.poetry.group.tests",
  "tool.poetry.group",
  "tool",
]
trailing_comma_inline_array = true
overrides."tool.isort.sections".inline_arrays = false
overrides."tool.tomlsort.sort_first".inline_arrays = false

[build-system]
build-backend = "poetry.core.masonry.api"
requires = [
  "poetry-core",
]
