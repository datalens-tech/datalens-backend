[tool.poetry]
authors = ["DataLens Team <datalens-opensource@yandex-team.ru>"]
description = "Aux pyproject.toml for the common project properties"
license = "Apache 2.0"
name = "datalens_backend_root_package"
readme = "README.md"
version = "0.1.0"

[tool.poetry.dependencies]
python = ">=3.12, <3.13"

[tool.black]
force-exclude = '''
/(
  # The following are specific to Black, you probably don't want those.
  lib/redis-cache-lock/
  | lib/clickhouse-sqlalchemy/
  | lib/dl_formula/dl_formula/parser/antlr/gen/
  | lib/dl_task_processor/dl_task_processor/upstream_worker.py
)
'''
line-length = 120
target-version = ['py312']

[tool.ruff]
exclude = [
  ".bzr",
  ".direnv",
  ".eggs",
  ".git",
  ".git-rewrite",
  ".hg",
  ".mypy_cache",
  ".nox",
  ".pants.d",
  ".pytype",
  ".ruff_cache",
  ".svn",
  ".tox",
  ".venv",
  "__pypackages__",
  "_build",
  "buck-out",
  "build",
  "dist",
  "lib/clickhouse-sqlalchemy/**",
  "lib/dl_formula/dl_formula/parser/antlr/gen/**",
  "lib/redis-cache-lock/**",
  "node_modules",
  "tools_venv",
  "venv",
]
force-exclude = true
line-length = 120
target-version = "py312"

[tool.ruff.lint]
ignore = [
  "B024", # is an abstract base class, but it has no abstract methods
  "B904", # force `raise ... from err` or `raise ... from None`
  "B905", # `zip()` without an explicit `strict=` parameter
  "E501", # line length, should be checked and fixed by black
  "RET503", # implicit return — usually a raise/abort path; adding explicit `return None` masks the actual control flow
  "RET504", # unnecessary assign before return — review needed per site; intermediate names often aid debugging
  "UP031", # Use format specifiers instead of percent format
  "UP042", # Class inherits from both `str` and `enum.Enum`
  "UP046", # Non-PEP 695 generic class — needs manual conversion for attrs+cross-module TypeVar bounds
]
select = [
  # Bugbear
  "B",
  # Pyflakes
  "F",
  # isort
  "I",
  # flake8-return
  "RET",
  # pyupgrade
  "UP",
]

[tool.ruff.lint.isort]
detect-same-package = false
force-sort-within-sections = true
known-first-party = [
  "app_*",
  "bi_*",
  "dl_*",
]
section-order = [
  "future",
  "standard-library",
  "third-party",
  "first-party",
  "connectors",
  "local-folder",
]

[tool.ruff.lint.isort.sections]
connectors = [
  "bi_connector_*",
  "dl_connector_*",
]

[tool.tomlsort]
all = true
ignore_case = true
in_place = true
sort_first = [
  "tool.poetry",
  "tool.poetry.dependencies",
  "tool.poetry.group.tests",
  "tool.poetry.group",
  "tool",
]
trailing_comma_inline_array = true
overrides."tool.ruff.lint.isort.section-order".inline_arrays = false
overrides."tool.tomlsort.sort_first".inline_arrays = false

[build-system]
build-backend = "poetry.core.masonry.api"
requires = [
  "poetry-core",
]
