[tool.poetry]
authors = ["DataLens Team <datalens-opensource@yandex-team.ru>"]
description = ""
license = "Apache 2.0"
name = "dl-connector-starrocks"
packages = [{include = "dl_connector_starrocks"}]
readme = "README.md"
version = "0.0.1"

[tool.poetry.dependencies]
attrs = ">=22.2.0"
dl-constants = {path = "../dl_constants"}
dl-core = {path = "../dl_core"}
dl-db-testing = {path = "../dl_db_testing"}
dl-formula = {path = "../dl_formula"}
dl-i18n = {path = "../dl_i18n"}
dl-type-transformer = {path = "../dl_type_transformer"}
python = ">=3.10, <3.13"

[tool.mypy]
check_untyped_defs = true
disallow_untyped_defs = true
strict_optional = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true

[tool.pytest.ini_options]
addopts = "-ra"
minversion = "6.0"
testpaths = []

[build-system]
build-backend = "poetry.core.masonry.api"
requires = [
  "poetry-core",
]

[datalens.pytest.unit]
labels = ["no_compose"]
root_dir = "dl_connector_starrocks_tests/"
skip_compose = "true"
target_path = "unit"
