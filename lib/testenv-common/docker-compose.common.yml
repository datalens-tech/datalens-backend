x-constants:
  US_MASTER_TOKEN: &c-us-master-token "AC1ofiek8coB"

services:
  pg-us:
    build:
      context: ./images/pg-us
    environment:
      POSTGRES_DB: us-db-ci_purgeable
      POSTGRES_USER: us
      POSTGRES_PASSWORD: us
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "us-db-ci_purgeable"]
      interval: 5s
      retries: 10
      start_period: 3s

  us:
    labels:
      datalens.ci.service: united-storage
    build:
      context: ./images/us
    depends_on:
      pg-us:
        condition: service_healthy
    environment:
      POSTGRES_DSN_LIST: "postgres://us:us@pg-us:5432/us-db-ci_purgeable"
      AUTH_POLICY: "required"
      MASTER_TOKEN: *c-us-master-token
      BI_MASTER_TOKEN_PUBLIC_KEY_PRIMARY: | # Keep in sync with keys/dynamic_us_master_token_public_key.pem
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAlMuef3I3c8KhZ0im78Qu
        NL1bu2BEaKMDQy0hkIEJ3GRQ++Y/OqWNkYFX6RXUfXGPcyleWXRbzldXdlc6U4At
        SKO8mYD2Dkx2U/F82V86PAoPRt52mPPjU/emI01jQo8t6yhudWEVxzrdddBLrAb9
        Ffc4ahU1ln28coYkDpIVBrKJWQq065UR3MHVdr/KBtHT7nKN1ULAh/H2Fd/fME1G
        P26Q3H4/T9YlSOEuDRwFIW9e0Fy/0JDOxmyzLPd7LnWtrpgwtMICBG12pJVZjdmH
        jZ3H7ZaPKEa9/tfR/miKdwMEdyesVK9KKLqXQ19ILipuj3HBQmxeeeXAoD2Ihv4m
        8QIDAQAB
        -----END PUBLIC KEY-----
    volumes:
      - ./keys:/keys:ro
    restart: on-failure

  s3-storage:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z@sha256:640c22768ed5dbc92eacc14502a1b06a1c708fa60431345c78dfc22917062e93
    environment:
      MINIO_ROOT_USER: accessKey1
      MINIO_ROOT_PASSWORD: verySecretKey1
      MINIO_DOMAIN: local
    command: server --address ":8000" /export

  ssl-provider:
    build:
      context: ./images/ssl-provider
      dockerfile: Dockerfile

  temporal-postgresql:
    image: postgres:13-alpine3.20
    hostname: temporal-postgresql
    environment:
      POSTGRES_DB: temporal-db
      POSTGRES_USER: temporal-username
      POSTGRES_PASSWORD: temporal-password
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "temporal-db"]
      interval: 5s
      retries: 10
      start_period: 3s

  temporal:
    build:
      context: ./images/temporal
    hostname: temporal
    environment:
      - DEFAULT_NAMESPACE=temporal-namespace
      - POSTGRES_SEEDS=temporal-postgresql
      - DB_PORT=5432
      - DB=postgres12
      - POSTGRES_USER=temporal-username
      - POSTGRES_PWD=temporal-password
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development.yaml
    depends_on:
      - temporal-postgresql
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "workflow", "list"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 30s

  temporal-ui: # Use in dev environment only, not in CI
    image: temporalio/ui:2.31.2
    hostname: temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000 # TODO: change to proper port
    depends_on:
      - temporal
