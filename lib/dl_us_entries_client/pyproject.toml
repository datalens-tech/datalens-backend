[tool.poetry]
authors = ["DataLens Team <datalens-opensource@yandex-team.ru>"]
description = ""
license = "Apache 2.0"
name = "dl-us-entries-client"
packages = [{include = "dl_us_entries_client"}]
readme = "README.md"
version = "0.0.1"

[tool.poetry.dependencies]
attrs = "*"
dl-httpx = {path = "../dl_httpx"}
dl-json = {path = "../dl_json"}
dl-pydantic = {path = "../dl_pydantic"}
httpx = "*"
pydantic = "*"
python = ">=3.10, <3.13"
typing-extensions = "*"

[tool.poetry.group.tests.dependencies]
dl-core-testing = {path = "../dl_core_testing"}
dl-retrier = {path = "../dl_retrier"}
dl-testing = {path = "../dl_testing"}
pytest = "*"
pytest-asyncio = ">=0.23"

[tool.deptry.per_rule_ignores]
DEP002 = ["pytest-asyncio"]

[tool.mypy]
check_untyped_defs = true
disallow_untyped_defs = true
strict_optional = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true

[tool.pytest.ini_options]
addopts = "-ra"
minversion = "6.0"
testpaths = []

[build-system]
build-backend = "poetry.core.masonry.api"
requires = [
  "poetry-core",
]

[datalens.pytest.db]
root_dir = "dl_us_entries_client_tests/"
target_path = "db"
