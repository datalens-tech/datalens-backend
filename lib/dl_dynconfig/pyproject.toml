[tool.poetry]
authors = ["DataLens Team <datalens-opensource@yandex-team.ru>"]
description = ""
license = "Apache 2.0"
name = "dl-dynconfig"
packages = [{include = "dl_dynconfig"}]
readme = "README.md"
version = "0.0.1"

[tool.poetry.dependencies]
aiobotocore = "*"
attrs = "*"
dl-pydantic = {path = "../dl_pydantic"}
dl-settings = {path = "../dl_settings"}
pydantic = "*"
python = ">=3.10, <3.13"
pyyaml = "*"
typing-extensions = "*"

[tool.poetry.group.tests.dependencies]
dl-testing = {path = "../dl_testing"}
pytest = "*"
pytest-asyncio = "*"

[tool.mypy]
check_untyped_defs = true
disallow_untyped_defs = true
strict_optional = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
ignore_missing_imports = true
module = ["types_aiobotocore_s3.*"]

[tool.pytest.ini_options]
addopts = "-ra"
minversion = "6.0"
testpaths = []

[build-system]
build-backend = "poetry.core.masonry.api"
requires = [
  "poetry-core",
]

[datalens.pytest.db]
root_dir = "dl_dynconfig_tests/"
target_path = "db"

[datalens.pytest.unit]
labels = ["no_compose"]
root_dir = "dl_dynconfig_tests/"
skip_compose = "true"
target_path = "unit"
