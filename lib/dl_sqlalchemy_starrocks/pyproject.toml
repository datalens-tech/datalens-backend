[tool.poetry]
authors = ["DataLens Team <datalens-opensource@yandex-team.ru>"]
description = ""
license = "Apache 2.0"
name = "dl-sqlalchemy-starrocks"
packages = [{include = "dl_sqlalchemy_starrocks"}]
readme = "README.md"
version = "0.0.1"

[tool.poetry.dependencies]
dl-sqlalchemy-mysql = {path = "../dl_sqlalchemy_mysql"}
python = ">=3.10, <3.13"
sqlalchemy = ">=1.4.46, <2.0"

[tool.poetry.group.tests.dependencies]
pytest = "*"

[tool.poetry.plugins."sqlalchemy.dialects"]
bi_starrocks = "dl_sqlalchemy_starrocks.base:BiStarRocksDialect"

[tool.mypy]
check_untyped_defs = true
disallow_untyped_defs = true
strict_optional = true
warn_redundant_casts = true
warn_unused_configs = true
warn_unused_ignores = true

[tool.pytest.ini_options]
addopts = "-ra"
minversion = "6.0"
testpaths = ["dl_sqlalchemy_starrocks_tests/unit"]

[build-system]
build-backend = "poetry.core.masonry.api"
requires = [
  "poetry-core",
]

[datalens.pytest.unit]
labels = ["no_compose"]
root_dir = "dl_sqlalchemy_starrocks_tests/"
skip_compose = "true"
target_path = "unit"
